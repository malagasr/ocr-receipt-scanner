[theme]
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[runner]
magicEnabled = false
installTracer = false

[client]
showErrorDetails = true